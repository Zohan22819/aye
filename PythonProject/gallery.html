            <div class="container section">
                <h1 align="center" data-aos="fade-down">Красота Севера</h1>
                <div class="grid-gallery">
                    <div class="gallery-item" data-aos="flip-left"><img src="https://static.tildacdn.com/tild6337-6466-4536-b161-366661393662/bLyZhiHsQFs.jpg"></div>
                    <div class="gallery-item" data-aos="flip-up"><img src="https://gorodarus.ru/images/vihorevka/vohorevka5.jpg"></div>

            <script src="https://unpkg.com"></script>
            <script>
const btn = document.getElementById('theme-btn');
const body = document.documentElement;

btn.onclick = () => {
    const isDark = body.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    body.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    btn.innerHTML = newTheme === 'dark' ? '☀️ Свет' : '🌙 Тьма';
};

// Загрузка темы
const saved = localStorage.getItem('theme') || 'light';
body.setAttribute('data-theme', saved);
btn.innerHTML = saved === 'dark' ? '☀️ Свет' : '🌙 Тьма';

// Инициализация AOS (анимация при скролле)
AOS.init({ duration: 1000, once: true });
</script>
        </body>
        </html>
